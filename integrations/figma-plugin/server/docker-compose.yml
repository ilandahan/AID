# ===========================================
# Figma Plugin Server - Docker Compose
# ===========================================
# Separate compose file for Figma integration
# Auto-starts with Docker Desktop via restart policy

services:
  figma-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aid-figma-server

    # AUTO-START: This ensures container starts with Docker Desktop
    restart: always

    # Environment configuration - reads from .env in this directory
    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3001
      AID_PROJECT_PATH: /app/output

    # Volume for exported components
    volumes:
      - aid-components:/app/output

    # Port mapping - exposes port 3001 to host
    ports:
      - "3001:3001"

    # Health check configuration
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: aid-figma-network

volumes:
  aid-components:
