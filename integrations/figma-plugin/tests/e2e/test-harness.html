<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma Plugin Test Harness</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid #0f3460;
    }
    .header h1 {
      font-size: 16px;
      color: #0c8ce9;
    }
    .status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #22c55e;
    }
    .status.error {
      background: #ef4444;
    }
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .plugin-frame {
      flex: 1;
      border: none;
      background: white;
    }
    .console-panel {
      width: 400px;
      background: #0d1117;
      border-left: 1px solid #30363d;
      display: flex;
      flex-direction: column;
    }
    .console-header {
      padding: 10px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      font-weight: 600;
    }
    .console-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 11px;
    }
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry.message { color: #58a6ff; }
    .log-entry.response { color: #3fb950; }
    .log-entry.error { color: #f85149; }
    .log-entry .timestamp {
      color: #8b949e;
      margin-right: 8px;
    }
    .controls {
      padding: 10px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 10px;
    }
    .controls button {
      padding: 6px 12px;
      background: #238636;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }
    .controls button:hover {
      background: #2ea043;
    }
    .controls button.secondary {
      background: #21262d;
    }
    .controls button.secondary:hover {
      background: #30363d;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Figma Plugin Test Harness</h1>
    <span class="status" id="serverStatus">Server: Checking...</span>
    <span class="status" id="pairingStatus">Pairing: Not paired</span>
  </div>

  <div class="main">
    <iframe id="pluginFrame" class="plugin-frame" src="http://localhost:8080/ui.html"></iframe>

    <div class="console-panel">
      <div class="console-header">Message Log</div>
      <div class="console-log" id="consoleLog"></div>
      <div class="controls">
        <button onclick="generatePairingCode()">Generate OTP</button>
        <button onclick="simulateSelect()" class="secondary">Simulate Select</button>
        <button onclick="clearLog()" class="secondary">Clear Log</button>
      </div>
    </div>
  </div>

  <script>
    const SERVER_URL = 'http://localhost:3001';
    const consoleLog = document.getElementById('consoleLog');
    const serverStatus = document.getElementById('serverStatus');
    const pairingStatus = document.getElementById('pairingStatus');
    const pluginFrame = document.getElementById('pluginFrame');

    let currentToken = null;
    let lastOtpCode = null;

    // Logging
    function log(type, message) {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `<span class="timestamp">[${time}]</span>${typeof message === 'object' ? JSON.stringify(message, null, 2) : message}`;
      consoleLog.appendChild(entry);
      consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    function clearLog() {
      consoleLog.innerHTML = '';
    }

    // Server health check
    async function checkServer() {
      try {
        const res = await fetch(`${SERVER_URL}/health`);
        const data = await res.json();
        serverStatus.textContent = `Server: ${data.status}`;
        serverStatus.classList.remove('error');
        log('response', `Server healthy: ${JSON.stringify(data)}`);
      } catch (e) {
        serverStatus.textContent = 'Server: Offline';
        serverStatus.classList.add('error');
        log('error', `Server check failed: ${e.message}`);
      }
    }

    // Generate pairing code (simulates Claude Code running /aid-pair)
    async function generatePairingCode() {
      try {
        log('message', 'Generating pairing code...');
        const res = await fetch(`${SERVER_URL}/auth/generate-pairing`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tenantId: 'test-tenant-001',
            projectPath: 'C:\\test\\project'
          })
        });
        const data = await res.json();
        if (data.code) {
          lastOtpCode = data.code;
          log('response', `OTP Code: ${data.code}\n${data.message || ''}`);
          alert(`Generated OTP: ${data.code}\n\nEnter this code in the plugin UI.`);
        } else {
          log('error', `Failed to generate: ${JSON.stringify(data)}`);
        }
      } catch (e) {
        log('error', `Generate pairing failed: ${e.message}`);
      }
    }

    // Validate pairing code (simulates plugin calling pair endpoint)
    async function validatePairingCode(code) {
      try {
        log('message', `Validating code: ${code}`);
        const res = await fetch(`${SERVER_URL}/auth/pair`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        log('response', `Validation result: ${JSON.stringify(data)}`);
        if (data.token) {
          currentToken = data.token;
          pairingStatus.textContent = 'Pairing: Paired';
          pairingStatus.classList.remove('error');
          return { success: true, token: data.token };
        } else {
          pairingStatus.textContent = 'Pairing: Failed';
          pairingStatus.classList.add('error');
          return { success: false, error: data.error || 'Unknown error' };
        }
      } catch (e) {
        log('error', `Validation failed: ${e.message}`);
        return { success: false, error: e.message };
      }
    }

    // Simulate component selection
    function simulateSelect() {
      const component = {
        id: '123:456',
        name: 'PrimaryButton',
        type: 'COMPONENT',
        description: 'Primary call-to-action button',
        category: 'atoms',
        children: [
          { id: '123:457', name: 'Label', type: 'TEXT' },
          { id: '123:458', name: 'Icon', type: 'VECTOR' }
        ]
      };
      log('message', `Simulating component selection: ${component.name}`);
      sendToPlugin('SELECTION_CHANGED', { node: component });
    }

    // Send message to plugin iframe
    function sendToPlugin(type, payload) {
      const message = { pluginMessage: { type, ...payload } };
      log('message', `→ Plugin: ${type}`);
      pluginFrame.contentWindow.postMessage(message, '*');
    }

    // Listen for messages from plugin iframe
    window.addEventListener('message', async (event) => {
      if (event.source !== pluginFrame.contentWindow) return;

      const msg = event.data?.pluginMessage;
      if (!msg) return;

      log('message', `← Plugin: ${msg.type}`);

      switch (msg.type) {
        case 'AID_PAIR':
          const result = await validatePairingCode(msg.code);
          if (result.success) {
            sendToPlugin('AID_PAIRED', { token: result.token });
          } else {
            sendToPlugin('AID_PAIR_FAILED', { error: result.error });
          }
          break;

        case 'CHECK_AID_TOKEN':
          if (currentToken) {
            sendToPlugin('AID_TOKEN_VALID', { valid: true, token: currentToken });
          } else {
            sendToPlugin('AID_TOKEN_INVALID', { valid: false });
          }
          break;

        case 'INIT':
          log('message', 'Plugin initialized');
          sendToPlugin('INIT_COMPLETE', { ready: true });
          break;

        case 'SET_LOCALE':
          log('message', `Locale changed to: ${msg.locale}`);
          break;

        case 'RUN_FULL_PIPELINE':
          log('message', 'Running full quality pipeline...');
          setTimeout(() => {
            sendToPlugin('PIPELINE_COMPLETE', {
              results: {
                audit: {
                  scores: { overall: 85, naming: 90, structure: 80, visual: 85, accessibility: 75 },
                  issues: [
                    { severity: 'warning', message: 'Consider better nesting structure', location: 'Frame > Button' },
                    { severity: 'error', message: 'Missing alt text for icon', location: 'Icon layer' }
                  ]
                },
                metadata: {
                  componentSetLevel: { present: ['name', 'description'], missing: ['category', 'tags'] },
                  variantLevel: { total: 4, withDescription: 2 }
                },
                generated: {
                  formattedDescription: '/**\n * PrimaryButton\n * @description Primary call-to-action button\n * @category atoms\n * @variants default, hover, disabled, loading\n */'
                },
                report: {
                  overallScore: 85,
                  exportReady: false,
                  recommendations: ['Add missing metadata', 'Fix accessibility issues']
                }
              }
            });
          }, 1500);
          break;

        case 'RUN_QUALITY_PIPELINE':
        case 'RUN_AUDIT':
          log('message', 'Running audit...');
          setTimeout(() => {
            sendToPlugin('AUDIT_COMPLETE', {
              scores: { overall: 85, naming: 90, structure: 80, visual: 85, accessibility: 75 },
              issues: [
                { severity: 'warning', message: 'Consider nesting', location: 'Frame' },
                { severity: 'error', message: 'Missing alt text', location: 'Icon' }
              ]
            });
          }, 1000);
          break;

        case 'ANALYZE_METADATA':
          log('message', 'Analyzing metadata...');
          setTimeout(() => {
            sendToPlugin('METADATA_ANALYSIS', {
              required: ['name', 'description', 'category'],
              present: ['name'],
              missing: ['description', 'category'],
              completeness: 33
            });
          }, 500);
          break;

        case 'GENERATE_METADATA':
          log('message', 'Generating metadata...');
          setTimeout(() => {
            sendToPlugin('METADATA_GENERATED', {
              description: 'Primary call-to-action button for forms',
              category: 'atoms',
              variants: ['default', 'hover', 'disabled'],
              props: { label: 'string', onClick: 'function', disabled: 'boolean' }
            });
          }, 1500);
          break;

        case 'EXPORT_TO_AID':
          log('message', 'Exporting to AID...');
          sendToPlugin('EXPORT_RESULT', { success: true, exportId: 'exp_' + Date.now() });
          break;

        case 'EXPORT_CONTENT':
          log('message', `Exporting as ${msg.format}...`);
          sendToPlugin('CONTENT_EXPORTED', { format: msg.format, success: true });
          break;

        case 'SEND_TO_CLAUDE':
          log('message', 'Sending to Claude Code...');
          setTimeout(() => {
            sendToPlugin('CLAUDE_RESPONSE', {
              success: true,
              message: 'Component analyzed successfully'
            });
          }, 2000);
          break;

        default:
          log('message', `Unknown message type: ${msg.type}`);
      }
    });

    // Initialize
    checkServer();
    setInterval(checkServer, 30000);

    log('message', 'Test harness loaded. Click "Generate OTP" to create a pairing code.');
  </script>
</body>
</html>
